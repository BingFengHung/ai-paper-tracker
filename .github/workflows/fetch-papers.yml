name: Fetch AI Papers

on:
  schedule:
    - cron: "0 0,12 * * *"  # Every 12 hours UTC
  workflow_dispatch:              # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch papers from arXiv
        run: python scripts/fetch_papers.py

      - name: Commit updated papers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers.json
          git diff --staged --quiet || git commit -m "chore: update AI papers [$(date -u +'%Y-%m-%d %H:%M')] UTC"
          git push
