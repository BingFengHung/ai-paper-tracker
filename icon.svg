<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#6366f1"/>
  <!-- Robot face -->
  <rect x="22" y="28" width="56" height="44" rx="10" fill="none" stroke="white" stroke-width="4.5"/>
  <!-- Eyes -->
  <circle cx="37" cy="47" r="6" fill="white"/>
  <circle cx="63" cy="47" r="6" fill="white"/>
  <circle cx="38.5" cy="48.5" r="2.5" fill="#6366f1"/>
  <circle cx="64.5" cy="48.5" r="2.5" fill="#6366f1"/>
  <!-- Mouth -->
  <rect x="33" y="60" width="34" height="6" rx="3" fill="white"/>
  <!-- Antenna -->
  <line x1="50" y1="28" x2="50" y2="14" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="50" cy="11" r="5" fill="white"/>
  <!-- Ears -->
  <rect x="14" y="42" width="8" height="12" rx="3" fill="white"/>
  <rect x="78" y="42" width="8" height="12" rx="3" fill="white"/>
</svg>
